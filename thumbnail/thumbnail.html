<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Thumbnail Generator</title>
<style>
  body { margin: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 12px; }
  canvas { display: block; image-rendering: pixelated; }
  button { padding: 10px 24px; font-size: 15px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 6px; }
  button:hover { background: #666; }
</style>
</head>
<body>
<canvas id="c" width="630" height="500"></canvas>
<button onclick="save()">PNG保存</button>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 630, H = 500;

function draw() {
  // ---------- background gradient ----------
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0d1b3e');
  bg.addColorStop(1, '#1a0a2e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // floor glow
  const floorGlow = ctx.createRadialGradient(W/2, H*0.78, 10, W/2, H*0.78, 280);
  floorGlow.addColorStop(0, 'rgba(100,80,200,0.22)');
  floorGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = floorGlow;
  ctx.fillRect(0, 0, W, H);

  // floor
  ctx.fillStyle = '#1e1535';
  ctx.fillRect(0, H*0.78, W, H*0.22);
  ctx.fillStyle = '#7060c0';
  ctx.fillRect(0, H*0.78, W, 3);

  // background specks (stars)
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  const stars = [[60,40],[120,90],[200,55],[310,30],[420,70],[500,45],[580,100],[80,160],[350,140],[550,130]];
  for (const [x,y] of stars) { ctx.beginPath(); ctx.arc(x,y,1.5,0,Math.PI*2); ctx.fill(); }

  // ---------- VS flash center ----------
  const vsGlow = ctx.createRadialGradient(W/2, H*0.55, 0, W/2, H*0.55, 120);
  vsGlow.addColorStop(0, 'rgba(255,200,0,0.18)');
  vsGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = vsGlow;
  ctx.fillRect(0, 0, W, H);

  // ---------- draw characters ----------
  drawCharacter(ctx, 170, 360, 1,  '#e8e8f0', '#aaaacc');  // player (white, faces right)
  drawCharacter(ctx, 460, 360, -1, '#f5c0c0', '#cc8888');  // CPU (pink, faces left)

  // ---------- VS text ----------
  ctx.save();
  ctx.font = 'bold 54px "Arial Black", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#ffcc00';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#ffdd44';
  ctx.fillText('VS', W/2, H*0.53);
  ctx.shadowBlur = 0;
  ctx.restore();

  // ---------- title band ----------
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  roundRect(ctx, 30, 28, W-60, 88, 12);
  ctx.fill();

  // title border
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 2.5;
  roundRect(ctx, 30, 28, W-60, 88, 12);
  ctx.stroke();
  ctx.restore();

  // title text
  ctx.save();
  ctx.font = 'bold 38px "Noto Sans JP","Hiragino Kaku Gothic Pro","Meiryo",sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.9)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#ffee66';
  ctx.fillText('ふらふら頭突き対戦ゲーム', W/2, 72);
  ctx.restore();

  // ---------- "FIGHT!" label bottom ----------
  ctx.save();
  ctx.font = 'bold 22px "Arial Black", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(W/2-80, H*0.87, 160, 32);
  ctx.fillStyle = '#ff6644';
  ctx.fillText('HEADBUTT BATTLE', W/2, H*0.87+16);
  ctx.restore();

  // shadow under each character
  drawShadow(ctx, 170, H*0.78+2);
  drawShadow(ctx, 460, H*0.78+2);
}

function drawShadow(ctx, cx, y) {
  const g = ctx.createRadialGradient(cx, y, 2, cx, y, 55);
  g.addColorStop(0, 'rgba(0,0,0,0.45)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(cx, y, 55, 14, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawCharacter(ctx, cx, cy, dir, bodyColor, shadowColor) {
  ctx.save();
  ctx.translate(cx, cy);

  const lean = dir * 0.22; // lean toward opponent

  // --- legs ---
  ctx.strokeStyle = bodyColor; ctx.lineWidth = 12; ctx.lineCap = 'round';
  // left leg
  ctx.beginPath(); ctx.moveTo(-12, 0); ctx.lineTo(-20+dir*5, 50); ctx.stroke();
  // right leg
  ctx.beginPath(); ctx.moveTo(12, 0); ctx.lineTo(20+dir*5, 50); ctx.stroke();
  // feet
  ctx.fillStyle = shadowColor;
  ctx.beginPath(); ctx.ellipse(-20+dir*5, 53, 12, 6, lean, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(20+dir*5, 53, 12, 6, lean, 0, Math.PI*2); ctx.fill();

  // --- body ---
  ctx.save();
  ctx.rotate(lean);
  ctx.fillStyle = bodyColor;
  ctx.strokeStyle = shadowColor; ctx.lineWidth = 2;
  roundRect(ctx, -22, -60, 44, 60, 8);
  ctx.fill(); ctx.stroke();
  ctx.restore();

  // --- arms (one reaching forward) ---
  ctx.strokeStyle = bodyColor; ctx.lineWidth = 10; ctx.lineCap = 'round';
  // back arm
  ctx.beginPath(); ctx.moveTo(-dir*18, -48); ctx.lineTo(-dir*40, -20); ctx.stroke();
  // front arm (reaching forward for headbutt)
  ctx.beginPath(); ctx.moveTo(dir*18, -48); ctx.lineTo(dir*55, -70); ctx.stroke();
  ctx.fillStyle = bodyColor;
  ctx.beginPath(); ctx.arc(dir*55, -70, 8, 0, Math.PI*2); ctx.fill();

  // --- head (tilted forward) ---
  ctx.save();
  ctx.translate(dir*14, -82);
  ctx.rotate(dir * 0.4);
  // head glow for attacker
  if (dir === 1) {
    ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 18;
  }
  ctx.fillStyle = bodyColor;
  ctx.strokeStyle = shadowColor; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(0, 0, 26, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;
  // face
  ctx.fillStyle = '#333';
  // eyes
  ctx.beginPath(); ctx.arc(-8*dir, -4, 4, 0, Math.PI*2); ctx.fill(); // main eye
  ctx.beginPath(); ctx.arc(8*dir, -4, 3, 0, Math.PI*2); ctx.fill();
  // mouth (determined expression)
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-8, 10); ctx.lineTo(8, 10); ctx.stroke();
  // highlight
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.ellipse(-6*dir, -8, 7, 5, -0.4, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function save() {
  const a = document.createElement('a');
  a.download = 'thumbnail_630x500.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

draw();
</script>
</body>
</html>
